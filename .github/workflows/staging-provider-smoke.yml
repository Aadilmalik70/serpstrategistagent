name: Staging provider smoke

on:
  push:
    branches:
      - phase/02-identity-tenancy-billing
    paths:
      - .github/workflows/staging-provider-smoke.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  provider-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      API_URL: https://serpstrategistagent-production.up.railway.app
    steps:
      - name: Confirm deployed smoke route
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 12); do
            if curl -fsS "$API_URL/openapi.json" | grep -q '/internal/staging/provider-smoke'; then
              echo "Smoke route is deployed"
              exit 0
            fi
            echo "Waiting for deployed route ($attempt/12)"
            sleep 5
          done
          echo "Smoke route was not found on the deployed API"
          exit 1

      - name: Register disposable staging owner
        id: auth
        shell: bash
        run: |
          set -euo pipefail
          email="provider-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@example.com"
          payload=$(jq -nc \
            --arg email "$email" \
            '{email:$email,password:"provider-smoke-password-2026",name:"Provider Smoke",workspace_name:"Provider Smoke"}')
          response=$(curl -fsS \
            -X POST "$API_URL/auth/register" \
            -H 'Content-Type: application/json' \
            --data "$payload")
          token=$(jq -r '.access_token // empty' <<<"$response")
          workspace_id=$(jq -r '.workspace.id // empty' <<<"$response")
          test -n "$token"
          test -n "$workspace_id"
          echo "token=$token" >> "$GITHUB_OUTPUT"
          echo "workspace_id=$workspace_id" >> "$GITHUB_OUTPUT"

      - name: Call live AI and SerpAPI providers
        shell: bash
        run: |
          set -euo pipefail
          response=$(curl -fsS \
            -X POST "$API_URL/internal/staging/provider-smoke" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -H "X-Workspace-ID: ${{ steps.auth.outputs.workspace_id }}")
          jq . <<<"$response"
          jq . <<<"$response" > provider-smoke-result.json

      - name: Build sanitized PR report
        if: always()
        shell: bash
        run: |
          if [ -f provider-smoke-result.json ]; then
            environment=$(jq -r '.environment // "unknown"' provider-smoke-result.json)
            all_ok=$(jq -r '.all_ok // false' provider-smoke-result.json)
            ai_ok=$(jq -r '.ai.ok // false' provider-smoke-result.json)
            ai_model=$(jq -r '.ai.model // "n/a"' provider-smoke-result.json)
            ai_endpoint=$(jq -r '.ai.endpoint // "n/a"' provider-smoke-result.json)
            ai_error=$(jq -r '.ai.error // "none"' provider-smoke-result.json)
            serp_ok=$(jq -r '.serpapi.ok // false' provider-smoke-result.json)
            serp_status=$(jq -r '.serpapi.search_status // "n/a"' provider-smoke-result.json)
            serp_count=$(jq -r '.serpapi.organic_result_count // 0' provider-smoke-result.json)
            serp_error=$(jq -r '.serpapi.error // "none"' provider-smoke-result.json)
            cat > provider-smoke-comment.md <<EOF
          ## Live Railway provider smoke result

          Tested against: \`$API_URL\`

          - Environment: \`$environment\`
          - Overall: \`$all_ok\`
          - AI gateway: \`$ai_ok\`
          - AI model: \`$ai_model\`
          - AI endpoint: \`$ai_endpoint\`
          - AI error: \`$ai_error\`
          - SerpAPI: \`$serp_ok\`
          - SerpAPI status: \`$serp_status\`
          - Organic results returned: \`$serp_count\`
          - SerpAPI error: \`$serp_error\`

          No provider key or authorization header is included in this report.
          EOF
          else
            cat > provider-smoke-comment.md <<EOF
          ## Live Railway provider smoke result

          The staging smoke workflow failed before it produced a provider response. Check this workflow run's failed step. No provider key or authorization header was included.
          EOF
          fi

      - name: Post sanitized result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('provider-smoke-comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 4,
              body,
            });

      - name: Upload sanitized smoke result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-provider-smoke-result
          path: |
            provider-smoke-result.json
            provider-smoke-comment.md
          retention-days: 3
          if-no-files-found: warn

      - name: Assert both providers passed
        shell: bash
        run: jq -e '.all_ok == true and .ai.ok == true and .serpapi.ok == true' provider-smoke-result.json
